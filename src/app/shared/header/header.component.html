<header
  [class.scrolled]="isScrolled()"
  class="header"
  role="banner"
  aria-label="Main navigation">
  <div class="header__container container">
    <!-- Logo -->
    <a routerLink="/" class="header__logo" aria-label="NEXT AURA COMMUNICATIONS - Home">
      <span class="logo-next">NEXT</span><span class="logo-aura">AURA</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="header__nav" aria-label="Primary navigation">
      <ul class="header__nav-list">
        @for (link of navLinks; track link.route) {
          <li>
            <a
              [routerLink]="link.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: link.route === '/' }"
              class="header__nav-link">
              {{ link.label }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <!-- CTA Button -->
    <a href="tel:+91XXXXXXXXXX" class="btn btn-primary header__cta" aria-label="Call us now">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
      Call Now
    </a>

    <!-- Mobile Menu Toggle -->
    <button
      class="header__hamburger"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="isMobileMenuOpen()"
      aria-controls="mobile-menu"
      aria-label="Toggle navigation menu">
      <span class="hamburger-line" [class.open]="isMobileMenuOpen()"></span>
      <span class="hamburger-line" [class.open]="isMobileMenuOpen()"></span>
      <span class="hamburger-line" [class.open]="isMobileMenuOpen()"></span>
    </button>
  </div>

  <!-- Mobile Menu Overlay -->
  @if (isMobileMenuOpen()) {
    <div class="mobile-overlay" (click)="closeMobileMenu()"></div>
  }

  <!-- Mobile Menu Drawer -->
  <div
    id="mobile-menu"
    class="header__mobile"
    [class.open]="isMobileMenuOpen()"
    role="dialog"
    aria-label="Mobile navigation menu">
    <nav aria-label="Mobile navigation">
      <ul class="header__mobile-list">
        @for (link of navLinks; track link.route) {
          <li>
            <a
              [routerLink]="link.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: link.route === '/' }"
              class="header__mobile-link"
              (click)="closeMobileMenu()">
              {{ link.label }}
            </a>
          </li>
        }
        <li>
          <a href="tel:+91XXXXXXXXXX" class="btn btn-primary header__mobile-cta">
            Call Now
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
